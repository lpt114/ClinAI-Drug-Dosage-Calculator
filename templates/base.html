<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">

{% block head %}{% endblock %}

<style>

body{
font-family: Arial;
background:#f4f7fb;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#2c7be5;
color:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

button{
background:#2c7be5;
color:white;
padding:10px 16px;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1a5dcc;
}

input,select,textarea{
padding:8px;
width:100%;
max-width:400px;
}

.form-row{
display:flex;
align-items:center;
margin-bottom:15px;
gap:10px;
}

.form-row label{
width:140px;
font-weight:bold;
}

.small-input{
max-width:180px;
}

.tiny-input{
max-width:80px;
}

.unit-select{
max-width:70px;
}

textarea{
height:80px;
}

.autocomplete-items div {
  padding: 8px;
  cursor: pointer;
}

.autocomplete-items div:hover {
  background-color: #e9e9e9;
}
</style>

</head>

<body>

<div class="container">
{% block body %}{% endblock %}
</div>

<script>
(() => {
  const input = document.getElementById('drug_search');
  const select = document.getElementById('drug_select');
  const listContainer = document.getElementById('drug_list');

  if (!input || !select || !listContainer) {
    // The autocomplete fields are not on this page
    return;
  }

  // Convert select options into an array for searching
  const options = Array.from(select.options).map(opt => ({
    value: opt.value,
    label: opt.text
  }));

  // Helper: close list
  function closeList() {
    listContainer.innerHTML = '';
  }

  // Filter options based on input
  function filterOptions(val) {
    closeList();
    if (!val) return;

    const valLower = val.toLowerCase();

    // Filter options where label contains the typed string
    const filtered = options.filter(opt => opt.label.toLowerCase().includes(valLower));

    filtered.forEach(opt => {
      const div = document.createElement('div');
      div.textContent = opt.label;
      div.addEventListener('click', () => {
        input.value = opt.label;
        select.value = opt.value;
        closeList();
      });
      listContainer.appendChild(div);
    });
  }

  input.addEventListener('input', (e) => {
    select.value = ''; // reset select since input changed
    filterOptions(e.target.value);
  });

  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (e.target !== input) {
      closeList();
    }
  });

  // On form submit, ensure input matches a valid option
  input.closest('form').addEventListener('submit', (e) => {
    const val = input.value.trim().toLowerCase();
    const found = options.find(opt => opt.label.toLowerCase() === val);
    if (!found) {
      e.preventDefault();
      alert('Please select a valid drug from the list.');
      input.focus();
    } else {
      select.value = found.value;
    }
  });
})();
</script>

</body>
</html>
