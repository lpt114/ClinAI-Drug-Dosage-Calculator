<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  {% block head %}{% endblock %}

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b24;
      --surface2:  #1e2533;
      --border:    #2a3242;
      --border2:   #3a4558;
      --accent:    #3d9eff;
      --accent2:   #00e5c0;
      --warn:      #f59e0b;
      --danger:    #ef4444;
      --success:   #22c55e;
      --text:      #e8edf5;
      --muted:     #6b7f99;
      --label:     #94a3b8;
      --mono:      'DM Mono', monospace;
      --serif:     'Instrument Serif', serif;
      --sans:      'DM Sans', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(61,158,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,158,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── Nav ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(13,17,23,0.88);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 32px; height: 56px;
    }
    .topbar-left { display: flex; align-items: center; gap: 24px; }
    .topbar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .logo-mark {
      width: 30px; height: 30px;
      border: 1.5px solid var(--accent); border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent);
    }
    .logo-text { font-family: var(--serif); font-size: 20px; color: var(--text); font-style: italic; }
    .nav-links { display: flex; gap: 4px; }
    .nav-link {
      font-size: 13px; color: var(--muted); text-decoration: none;
      padding: 5px 12px; border-radius: 6px;
      transition: background 0.15s, color 0.15s;
      font-family: var(--mono);
    }
    .nav-link:hover { background: var(--surface2); color: var(--text); }
    .topbar-badge {
      font-family: var(--mono); font-size: 10px; color: var(--muted);
      letter-spacing: 0.05em; border: 1px solid var(--border);
      padding: 3px 8px; border-radius: 20px;
    }

    /* ── Shell ── */
    .shell {
      position: relative; z-index: 1;
      max-width: 980px; margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── Typography ── */
    .page-title { font-family: var(--serif); font-size: 36px; font-style: italic; margin-bottom: 4px; }
    .page-sub { font-size: 13px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.04em; margin-bottom: 40px; }

    .section-title {
      font-size: 11px; font-family: var(--mono); font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent);
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 28px 32px; margin-bottom: 24px;
      transition: border-color 0.2s; animation: fadeUp 0.4s ease both;
    }
    .card:hover { border-color: var(--border2); }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 16px; border-bottom: 1px solid var(--border); font-size: 14px; }
    th { font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
    td:first-child { color: var(--label); font-weight: 500; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    /* ── Forms ── */
    .form-group {
      display: grid; grid-template-columns: 160px 1fr;
      align-items: start; gap: 8px 16px; margin-bottom: 18px;
    }
    .form-group label {
      font-size: 13px; font-weight: 500; color: var(--label);
      padding-top: 10px; line-height: 1.3;
      display: flex; align-items: flex-start; gap: 4px;
    }
    .form-group .input-wrap { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    input[type="text"], input[type="number"], select, textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 7px; color: var(--text); font-family: var(--sans);
      font-size: 14px; padding: 9px 13px; outline: none; width: 100%;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,158,255,0.12);
    }
    textarea { resize: vertical; min-height: 80px; }
    .input-sm { max-width: 130px; }
    .input-xs { max-width: 80px; }
    .input-unit { max-width: 72px; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--accent); color: #fff; border: none; border-radius: 7px;
      padding: 10px 20px; font-family: var(--sans); font-size: 14px; font-weight: 500;
      cursor: pointer; transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      text-decoration: none;
    }
    .btn:hover { background: #2c8de8; box-shadow: 0 4px 16px rgba(61,158,255,0.25); transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-ghost {
      background: transparent; color: var(--label); border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--surface2); border-color: var(--border2); color: var(--text); box-shadow: none; }
    .btn-danger {
      background: transparent; color: var(--danger); border: 1px solid rgba(239,68,68,0.35);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.08); box-shadow: none; transform: none; }
    .btn-sm { padding: 7px 14px; font-size: 13px; }

    /* ── Misc layout ── */
    .search-row { display: flex; gap: 10px; align-items: center; }
    .search-row input { max-width: 260px; }
    .action-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 36px 0; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: var(--muted); text-decoration: none;
      font-size: 13px; font-family: var(--mono); margin-bottom: 28px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--accent); }
    .cols-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }

    /* ── Badges / Tags ── */
    .pid-badge {
      display: inline-block; font-family: var(--mono); font-size: 12px;
      color: var(--accent); background: rgba(61,158,255,0.1);
      border: 1px solid rgba(61,158,255,0.25); padding: 3px 10px;
      border-radius: 20px; margin-bottom: 20px;
    }
    .tag {
      display: inline-block; font-family: var(--mono); font-size: 11px;
      padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border2); color: var(--muted);
    }
    .tag-warn  { color: var(--warn);    border-color: rgba(245,158,11,0.3);  background: rgba(245,158,11,0.07); }
    .tag-ok    { color: var(--success); border-color: rgba(34,197,94,0.3);   background: rgba(34,197,94,0.07); }
    .tag-info  { color: var(--accent);  border-color: rgba(61,158,255,0.3);  background: rgba(61,158,255,0.07); }

    /* ── Dose display ── */
    .dose-pill {
      display: inline-flex; align-items: baseline; gap: 4px;
      background: linear-gradient(135deg, rgba(0,229,192,0.10), rgba(61,158,255,0.10));
      border: 1px solid rgba(0,229,192,0.28); border-radius: 8px;
      padding: 14px 22px; margin-bottom: 24px;
    }
    .dose-value { font-family: var(--mono); font-size: 42px; font-weight: 500; color: var(--accent2); line-height: 1; }
    .dose-unit  { font-family: var(--mono); font-size: 14px; color: var(--muted); }
    .result-drug { font-family: var(--serif); font-size: 22px; font-style: italic; margin-bottom: 16px; }

    /* ── Explanation steps ── */
    .steps-list { list-style: none; padding: 0; margin-top: 4px; counter-reset: step; }
    .steps-list li {
      display: flex; gap: 14px; align-items: flex-start;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      font-size: 13.5px; color: var(--label); counter-increment: step;
    }
    .steps-list li:last-child { border-bottom: none; }
    .steps-list li::before {
      content: counter(step, decimal-leading-zero);
      font-family: var(--mono); font-size: 11px; color: var(--accent);
      flex-shrink: 0; margin-top: 3px; width: 22px;
    }

    /* ── Warning / disclaimer ── */
    .warning-box {
      background: rgba(245,158,11,0.07); border: 1px solid rgba(245,158,11,0.28);
      border-radius: 8px; padding: 14px 18px; margin-top: 16px;
      display: flex; gap: 12px;
    }
    .warning-box ul { list-style: none; padding: 0; }
    .warning-box li { font-size: 13.5px; color: #f5d98b; margin-bottom: 4px; }
    .warning-box li:last-child { margin-bottom: 0; }

    .disclaimer {
      background: rgba(61,158,255,0.05); border: 1px solid rgba(61,158,255,0.16);
      border-radius: 8px; padding: 12px 18px; font-size: 12.5px;
      color: var(--muted); margin-top: 24px; display: flex; gap: 10px;
    }
    .disclaimer span { color: var(--accent); font-size: 14px; }

    /* ── Tooltips ── */
    .tooltip-wrap { position: relative; display: inline-flex; align-items: center; }
    .tooltip-icon {
      width: 15px; height: 15px; border-radius: 50%;
      background: var(--surface2); border: 1px solid var(--border2);
      color: var(--muted); font-size: 9px; font-family: var(--mono);
      display: inline-flex; align-items: center; justify-content: center;
      cursor: help; margin-left: 4px; flex-shrink: 0;
    }
    .tooltip-box {
      display: none; position: absolute; left: 22px; top: -4px;
      width: 220px; background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 7px; padding: 9px 12px; font-size: 12px; color: var(--label);
      z-index: 300; line-height: 1.5; box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      pointer-events: none;
    }
    .tooltip-wrap:hover .tooltip-box { display: block; }

    /* ── Dose history ── */
    .log-entry {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 14px 18px; margin-bottom: 10px;
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 16px; font-size: 13.5px;
    }
    .log-drug { font-weight: 500; color: var(--text); }
    .log-dose { font-family: var(--mono); color: var(--accent2); font-size: 15px; }
    .log-time { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* ── Autocomplete ── */
    #drug_list {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: var(--surface2); border: 1px solid var(--border2);
      border-radius: 8px; max-height: 180px; overflow-y: auto;
      z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #drug_list div { padding: 10px 14px; cursor: pointer; font-size: 13.5px; color: var(--text); transition: background 0.1s; }
    #drug_list div:hover { background: rgba(61,158,255,0.1); color: var(--accent); }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-title { animation: fadeUp 0.35s ease both; }
    .page-sub   { animation: fadeUp 0.35s 0.05s ease both; }
    .card:nth-child(1) { animation-delay: 0.04s; }
    .card:nth-child(2) { animation-delay: 0.09s; }
    .card:nth-child(3) { animation-delay: 0.14s; }
    .card:nth-child(4) { animation-delay: 0.19s; }

    @media (max-width: 640px) {
      .cols-2 { grid-template-columns: 1fr; }
      .form-group { grid-template-columns: 1fr; }
      .topbar { padding: 0 16px; }
      .shell  { padding: 28px 16px 60px; }
      .nav-links { display: none; }
    }
  </style>
</head>

<body>

  <nav class="topbar">
    <div class="topbar-left">
      <a class="topbar-logo" href="/">
        <div class="logo-mark">Rx</div>
        <span class="logo-text">ClinAI</span>
      </a>
      <div class="nav-links">
        <a class="nav-link" href="/">Home</a>
        <a class="nav-link" href="/patients">All Patients</a>
      </div>
    </div>
  </nav>

  <div class="shell">
    {% block body %}{% endblock %}
  </div>

  <script>
  (() => {
    const input = document.getElementById('drug_search');
    const select = document.getElementById('drug_select');
    const listContainer = document.getElementById('drug_list');
    if (!input || !select || !listContainer) return;

    const options = Array.from(select.options).map(opt => ({ value: opt.value, label: opt.text }));

    function closeList() { listContainer.innerHTML = ''; }

    function filterOptions(val) {
      closeList();
      if (!val) return;
      const lower = val.toLowerCase();
      options.filter(o => o.label.toLowerCase().includes(lower)).forEach(opt => {
        const div = document.createElement('div');
        div.textContent = opt.label;
        div.addEventListener('click', () => { input.value = opt.label; select.value = opt.value; closeList(); });
        listContainer.appendChild(div);
      });
    }

    input.addEventListener('input', e => { select.value = ''; filterOptions(e.target.value); });
    document.addEventListener('click', e => { if (e.target !== input) closeList(); });

    input.closest('form').addEventListener('submit', e => {
      const found = options.find(o => o.label.toLowerCase() === input.value.trim().toLowerCase());
      if (!found) { e.preventDefault(); alert('Please select a valid drug from the list.'); input.focus(); }
      else select.value = found.value;
    });
  })();
  </script>

</body>
</html>
