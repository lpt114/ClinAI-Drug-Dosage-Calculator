<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
{% block head %}{% endblock %}
<style>

body{
font-family: Arial;
background:#f4f7fb;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th{
background:#2c7be5;
color:white;
}

th,td{
padding:10px;
border:1px solid #ddd;
}

button{
background:#2c7be5;
color:white;
padding:10px 16px;
border:none;
border-radius:4px;
cursor:pointer;
}

button:hover{
background:#1a5dcc;
}

input,select,textarea{
padding:8px;
width:100%;
max-width:400px;
}

.form-row{
display:flex;
align-items:center;
margin-bottom:15px;
gap:10px;
}

.form-row label{
width:140px;
font-weight:bold;
}

.small-input{
max-width:180px;
}

.tiny-input{
max-width:80px;
}

.unit-select{
max-width:70px;
}

textarea{
height:80px;
}
</style>
</head>
<body>
<div class="container">
{% block body %}{% endblock %}
</div>
</body>
</html>
