{% extends "base.html" %}

{% block head %}<title>ClinAI — Drug Dosage Calculator</title>{% endblock %}

{% block body %}

<p class="page-title">Drug Dosage Calculator</p>


<!-- Search existing -->
<div class="section-title">Existing Patient</div>
<div class="card">
  <form action="/search_patient" method="post">
    <div class="search-row">
      <input type="number" name="patient_id" min="1" placeholder="Enter patient ID…" required>
      <button class="btn" type="submit">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Load Patient
      </button>
      <a class="btn btn-ghost btn-sm" href="/patients">View All Patients</a>
    </div>
  </form>
</div>

<hr class="divider">

<!-- New patient -->
<div class="section-title">New Patient</div>
<div class="card">
  <form action="/add_patient" method="post" onsubmit="convertUnits()">

    <div class="cols-2">

      <div>
        <div class="form-group">
          <label>
            Age
            <span class="tooltip-wrap">
              <span class="tooltip-icon">?</span>
              <span class="tooltip-box">Used for age-based dose adjustments. Patients ≥65 receive a 25% reduction; paediatric patients use weight-based dosing.</span>
            </span>
          </label>
          <div class="input-wrap">
            <input type="number" name="age" min="0" max="120" class="input-sm" placeholder="years" required>
          </div>
        </div>

        <div class="form-group">
          <label>Sex</label>
          <div class="input-wrap">
            <select name="sex" required style="max-width:180px;">
              <option value="">Select…</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>
            Weight
            <span class="tooltip-wrap">
              <span class="tooltip-icon">?</span>
              <span class="tooltip-box">Stored in kg. Used as the primary multiplier for weight-based dosing calculations.</span>
            </span>
          </label>
          <div class="input-wrap">
            <input type="number" id="weight_input" step="0.1" class="input-sm" min="0" placeholder="0.0" required>
            <select id="weight_unit" class="input-unit">
              <option value="kg">kg</option>
              <option value="lb">lb</option>
            </select>
            <input type="hidden" name="weight" id="weight_kg">
          </div>
        </div>

        <div class="form-group">
          <label>Height</label>
          <div class="input-wrap">
            <input type="number" id="height_ft"       placeholder="ft" class="input-xs" min="0" style="max-width:64px;">
            <input type="number" id="height_in"       placeholder="in" class="input-xs" min="0" max="11" style="max-width:64px;">
            <input type="number" id="height_cm_input" placeholder="cm" class="input-xs" min="0" style="display:none;max-width:80px;">
            <select id="height_unit" class="input-unit" onchange="toggleHeightUnit()">
              <option value="ft">ft/in</option>
              <option value="cm">cm</option>
            </select>
            <input type="hidden" name="height" id="height_cm">
          </div>
        </div>
      </div>

      <div>
        <div class="form-group">
          <label>Diagnosis</label>
          <div class="input-wrap">
            <input type="text" name="diagnosis" placeholder="Primary diagnosis" required>
          </div>
        </div>

        <div class="form-group">
          <label>
            Allergies
            <span class="tooltip-wrap">
              <span class="tooltip-icon">?</span>
              <span class="tooltip-box">The dosage engine scans this field for contraindications against the selected drug. List all known drug allergies.</span>
            </span>
          </label>
          <div class="input-wrap">
            <input type="text" name="allergies" placeholder="NKDA or list allergies…">
          </div>
        </div>

        <div class="form-group">
          <label>
            Medical History
            <span class="tooltip-wrap">
              <span class="tooltip-icon">?</span>
              <span class="tooltip-box">Also scanned for contraindication keywords (e.g. renal impairment, hepatic disease). Be thorough.</span>
            </span>
          </label>
          <div class="input-wrap">
            <textarea name="medical_history" placeholder="Comorbidities, relevant history…" style="width:100%;"></textarea>
          </div>
        </div>
      </div>

    </div>

    <div style="margin-top:8px;">
      <button class="btn" type="submit">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add Patient
      </button>
    </div>
    <input type="number" name="age" placeholder="Age" required>
    <input type="number" step="0.1" name="weight" placeholder="Weight (kg)" required>
    <input type="number" step="0.01" name="creatinine" placeholder="Creatinine" required>
    <input type="number" step="0.1" name="egfr" placeholder="eGFR" required>

  </form>
</div>



<script>
function toggleHeightUnit() {
  const unit = document.getElementById("height_unit").value;
  document.getElementById("height_ft").style.display       = unit === "ft" ? "block" : "none";
  document.getElementById("height_in").style.display       = unit === "ft" ? "block" : "none";
  document.getElementById("height_cm_input").style.display = unit === "cm" ? "block" : "none";
}
function convertUnits() {
  let weight = parseFloat(document.getElementById("weight_input").value);
  const wu   = document.getElementById("weight_unit").value;
  document.getElementById("weight_kg").value = (wu === "lb" ? weight * 0.453592 : weight).toFixed(2);
  const hu = document.getElementById("height_unit").value;
  let cm;
  if (hu === "cm") {
    cm = parseFloat(document.getElementById("height_cm_input").value);
  } else {
    const ft = parseFloat(document.getElementById("height_ft").value) || 0;
    const ins = parseFloat(document.getElementById("height_in").value) || 0;
    cm = ((ft * 12) + ins) * 2.54;
  }
  document.getElementById("height_cm").value = cm.toFixed(1);
}
</script>

{% endblock %}
