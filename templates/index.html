{% extends "base.html" %}
{% block head %}
<title>ClinAI</title>
{% endblock %}
{% block body %}

<h1>ClinAI</h1>

<h2>Search Patient by ID</h2>

<form action="/search_patient" method="post">
    <input type="number" name="patient_id" min="1" placeholder="Enter patient ID" required>
    <button type="submit">Search</button>
</form>

<hr>

<h2>Add New Patient</h2>

<form action="/add_patient" method="post" onsubmit="convertUnits()">

<div class="form-row">
<label>Age:</label>
<input type="number" name="age" min="0" max="120" required>
</div>

<div class="form-row">
<label>Sex:</label>
<select name="sex" required>
<option value="">Select</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>
</div>

<div class="form-row">
<label>Diagnosis:</label>
<input type="text" name="diagnosis" required>
</div>

<div class="form-row">
<label>Allergies:</label>
<input type="text" name="allergies">
</div>

<div class="form-row">
<label>Weight:</label>

<input type="number" id="weight_input" step="0.1" class="small-input" required>

<select id="weight_unit" class="unit-select">
<option value="kg">kg</option>
<option value="lb">lb</option>
</select>

<input type="hidden" name="weight" id="weight_kg">

</div>

<div class="form-row">
<label>Height:</label>

<input type="number" id="height_ft" placeholder="ft" class="tiny-input">

<input type="number" id="height_in" placeholder="in" class="tiny-input">

<input type="number" id="height_cm_input" placeholder="cm" class="tiny-input" style="display:none;">

<select id="height_unit" class="unit-select" onchange="toggleHeightUnit()">
<option value="ft">ft/in</option>
<option value="cm">cm</option>
</select>

<input type="hidden" name="height" id="height_cm">

</div>

<div class="form-row">
<label>Medical history:</label>
<textarea name="medical_history"></textarea>
</div>

<button type="submit">Add Patient</button>

</form>

<script>
function toggleHeightUnit(){

let unit = document.getElementById("height_unit").value;

let ft = document.getElementById("height_ft");
let inch = document.getElementById("height_in");
let cm = document.getElementById("height_cm_input");

if(unit === "cm"){

ft.style.display="none";
inch.style.display="none";
cm.style.display="block";

}else{

ft.style.display="block";
inch.style.display="block";
cm.style.display="none";

}

}

function convertUnits(){

let weight = parseFloat(document.getElementById("weight_input").value);
let weightUnit = document.getElementById("weight_unit").value;

let weightKg = weight;

if(weightUnit === "lb"){
weightKg = weight * 0.453592;
}

document.getElementById("weight_kg").value = weightKg.toFixed(2);


let heightUnit = document.getElementById("height_unit").value;

let cm;

if(heightUnit === "cm"){

cm = parseFloat(document.getElementById("height_cm_input").value);

}else{

let ft = parseFloat(document.getElementById("height_ft").value) || 0;
let inches = parseFloat(document.getElementById("height_in").value) || 0;

cm = ((ft * 12) + inches) * 2.54;

}

document.getElementById("height_cm").value = cm.toFixed(1);

}
</script>

{% endblock %}
