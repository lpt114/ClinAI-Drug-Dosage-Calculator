{% extends "base.html" %}

{% block head %}<title>Error — ClinAI</title>{% endblock %}

{% block body %}

<div style="text-align:center;padding:80px 24px;">
  <div style="font-family:var(--mono);font-size:64px;color:var(--border2);margin-bottom:16px;">404</div>
  <p class="page-title" style="margin-bottom:12px;">Something went wrong</p>
  <p style="color:var(--muted);font-size:14px;max-width:400px;margin:0 auto 32px;">
    {{ message or "An unexpected error occurred. Please try again." }}
  </p>
  <div class="action-row" style="justify-content:center;">
    <a class="btn" href="/">← Back to Home</a>
    <a class="btn btn-ghost" href="/patients">View All Patients</a>
  </div>
</div>

{% endblock %}
